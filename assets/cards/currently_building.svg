  .progress-bar-bg { background-color: #e5dacf; height: 6px; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 3px; }
</style>
<div class="card">
  <h2 class="card-title">🏗️ Currently Building</h2>
  
