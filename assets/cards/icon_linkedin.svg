<svg fill="none" viewBox="0 0 110 32" width="110" height="32" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        
@import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@400;500;600;700;800&amp;family=Courier+Prime&amp;display=swap');
body {
  font-family: 'Inter', sans-serif;
  color: #3c2f2f;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  background-color: transparent;
}
h1, h2, h3, h4, h5, h6 {
  font-family: 'Outfit', sans-serif;
  color: #2c1e1e;
  margin: 0;
}
.card {
  background-color: #fffdfa;
  border: 1px solid #e5dacf;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 10px rgba(139, 115, 85, 0.05);
  box-sizing: border-box;
  height: 100%;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #2c1e1e;
}

      </style>
      
<style>
  .icon-box {
    background-color: #fffdfa;
    border: 1px solid #e5dacf;
    border-radius: 6px;
    height: 32px;
    width: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    color: #3c2f2f;
    box-sizing: border-box;
  }
  .icon { width: 14px; height: 14px; }
</style>
<div class="icon-box">
  <img src="data:image/svg+xml;base64," class="icon" alt="LinkedIn" />
  <span>LinkedIn</span>
</div>

    </div>
  </foreignObject>
</svg>