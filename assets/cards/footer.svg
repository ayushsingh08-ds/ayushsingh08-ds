<svg fill="none" viewBox="0 0 850 110" width="850" height="110" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        
@import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@400;500;600;700;800&amp;family=Courier+Prime&amp;display=swap');
body {
  font-family: 'Inter', sans-serif;
  color: #3c2f2f;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  background-color: transparent;
}
h1, h2, h3, h4, h5, h6 {
  font-family: 'Outfit', sans-serif;
  color: #2c1e1e;
  margin: 0;
}
.card {
  background-color: #fffdfa;
  border: 1px solid #e5dacf;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 10px rgba(139, 115, 85, 0.05);
  box-sizing: border-box;
  height: 100%;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #2c1e1e;
}

      </style>
      
<style>
  .footer-container {
    width: 850px;
    height: 110px;
    position: relative;
    background-color: transparent;
  }
  .footer-bar {
    width: 850px;
    height: 50px;
    background-color: #3c2f2f;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    bottom: 0;
    left: 0;
    border-radius: 6px;
  }
  .footer-quote {
    font-family: 'Outfit', sans-serif;
    font-style: italic;
    font-size: 13.5px;
    color: #f4ebe1;
  }
  .quote-author {
    font-size: 11.5px;
    color: #ebdcb9;
    font-style: normal;
    margin-left: 6px;
  }
  .sticky-note {
    position: absolute;
    right: 35px;
    top: 5px;
    width: 180px;
    background-color: #fdf5c4;
    border-radius: 2px;
    padding: 10px 12px;
    box-shadow: -2px 5px 12px rgba(0,0,0,0.12);
    transform: rotate(-3deg);
    border-bottom-right-radius: 12px 3px;
    z-index: 5;
    box-sizing: border-box;
  }
  .sticky-note p {
    margin: 4px 0;
    font-family: 'Architects Daughter', cursive;
    font-size: 10px;
    color: #3c2d1b;
    line-height: 1.3;
  }
  .sticky-note .smiley {
    font-family: 'Architects Daughter', cursive;
    font-size: 13px;
    text-align: right;
    color: #3c2d1b;
    margin-top: 2px;
  }
</style>
<div class="footer-container">
  <div class="footer-bar">
    <div class="footer-quote">
      “ First, solve the problem. Then, write the code. ” <span class="quote-author">— John Johnson</span>
    </div>
  </div>
  <div class="sticky-note">
    <p>Code is like humor.</p>
    <p>When you have to explain it, it's bad.</p>
    <div class="smiley">☺</div>
  </div>
</div>

    </div>
  </foreignObject>
</svg>