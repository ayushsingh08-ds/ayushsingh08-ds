<svg fill="none" viewBox="0 0 200 80" width="200" height="80" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        
@import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@400;500;600;700;800&amp;family=Courier+Prime&amp;display=swap');
body {
  font-family: 'Inter', sans-serif;
  color: #3c2f2f;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  background-color: transparent;
}
h1, h2, h3, h4, h5, h6 {
  font-family: 'Outfit', sans-serif;
  color: #2c1e1e;
  margin: 0;
}
.card {
  background-color: #fffdfa;
  border: 1px solid #e5dacf;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 10px rgba(139, 115, 85, 0.05);
  box-sizing: border-box;
  height: 100%;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #2c1e1e;
}

      </style>
      
<style>
  .info-box {
    background-color: #fffdfa;
    border: 1px solid #e5dacf;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 80px;
    box-sizing: border-box;
  }
  .info-icon { width: 20px; height: 20px; flex-shrink: 0; }
  .info-text { display: flex; flex-direction: column; }
  .info-title { font-size: 11px; font-weight: 700; color: #2c1e1e; }
  .info-detail { font-size: 9px; color: #7a6a65; margin-top: 2px; }
</style>
<div class="info-box">
  <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="#b05a30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
  <div class="info-text">
    <div class="info-title">B.Tech CSE (Data Science)</div>
    <div class="info-detail">Dayananda Sagar University</div>
  </div>
</div>

    </div>
  </foreignObject>
</svg>